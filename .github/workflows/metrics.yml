name: Metrics
on:
  schedule: [{cron: "0 */12 * * *"}]
  workflow_dispatch:
  push: {branches: ["master", "main"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}

          # Options
          user: JTamag  
          template: terminal

          base: ""
          config_timezone: UTC

          # --- LANGUAGES PLUGIN  ---
          plugin_topics: yes
          plugin_topics_limit: 15
          plugin_topics_mode: icons

          # --- LEETCODE PLUGIN ---
          plugin_leetcode: yes
          plugin_leetcode_user: Tamag 
          plugin_leetcode_sections: solved, skills, recent
          plugin_leetcode_limit_recent: 2
