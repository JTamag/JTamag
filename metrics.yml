name: Metrics
on:
  # Schedule updates every 12 hours
  schedule: [{cron: "0 */12 * * *"}]
  # Lines below let you run it manually for testing
  workflow_dispatch:
  push: {branches: ["master", "main"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          # Your GitHub token
          token: ${{ secrets.METRICS_TOKEN }}

          # Options
          user: your-github-username  # <--- CHANGE THIS
          template: classic
          base: header, community, repositories, metadata
          config_timezone: UTC

          # --- LEETCODE PLUGIN ---
          plugin_leetcode: yes
          plugin_leetcode_user: your-leetcode-username # <--- CHANGE THIS
          plugin_leetcode_sections: solved, skills, recent
          plugin_leetcode_limit_recent: 2

          # --- TECH ICONS (Topics) ---
          plugin_topics: yes
          plugin_topics_limit: 15
          plugin_topics_mode: icons # This shows the logos!
          plugin_topics_sort: stars
